{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "agent-swarm.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-swarm.labels" . | nindent 4 }}
rules:
  # The agent process discovers sibling pool pods via the K8s API for status
  # reporting. Read-only on the chart's own namespace is sufficient.
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "agent-swarm.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "agent-swarm.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "agent-swarm.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "agent-swarm.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
